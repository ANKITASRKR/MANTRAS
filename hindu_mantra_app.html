let activeCategory = "All";
let openCards = {};
let activeLangs = {};

function renderCategories() {
  const c = document.getElementById("catScroll");
  c.innerHTML = CATEGORIES.map(cat =>
    `<button class="cat-btn ${cat === activeCategory ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</button>`
  ).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  renderCategories();
  renderMantras();
}

function renderMantras() {
  const query = document.getElementById("searchInput").value.toLowerCase();
  const list = document.getElementById("mantraList");
  const filtered = MANTRAS.filter(m => {
    const matchCat = activeCategory === "All" || m.deity === activeCategory;
    const matchSearch = !query || m.name.toLowerCase().includes(query) || m.deity.toLowerCase().includes(query) || m.meaning.toLowerCase().includes(query) || m.sanskrit.includes(query);
    return matchCat && matchSearch;
  });

  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state">🙏 No mantras found. Try a different search or category.</div>';
    return;
  }

  list.innerHTML = filtered.map(m => {
    const isOpen = openCards[m.id];
    const langs = Object.keys(m.langs);
    const activeLang = activeLangs[m.id] || langs[0];
    const langContent = m.langs[activeLang];
    return `
    <div class="mantra-card" id="card-${m.id}">
      <div class="card-header" onclick="toggleCard(${m.id})">
        <div class="card-title-block">
          <div class="deity-icon" style="background:${m.iconBg}20; border: 1px solid ${m.iconBg}40; font-size:14px;">${m.icon}</div>
          <div>
            <div class="card-name">${m.name}</div>
            <div class="card-type">${m.deity} • ${m.type}</div>
          </div>
        </div>
        <span class="expand-icon ${isOpen ? 'open' : ''}">▼</span>
      </div>
      ${isOpen ? `
      <div class="card-body show">
        <div class="mantra-text">${m.sanskrit}</div>
        <div class="meaning-block"><strong>Meaning:</strong> ${m.meaning}</div>
        <div class="divider"></div>
        <div style="font-size:0.72rem; color:var(--color-text-secondary); margin-bottom:0.4rem;">Select Language:</div>
        <div class="lang-tabs">
          ${langs.map(l => `<div class="lang-tab ${l === activeLang ? 'active' : ''}" onclick="setLang(${m.id}, '${l}')">${l}</div>`).join('')}
        </div>
        <div class="lang-content show">
          <div class="lang-text">${langContent.text}</div>
          <div class="lang-label">${langContent.note}</div>
        </div>
        <div class="benefits-row">
          ${m.benefits.map(b => `<span class="benefit-pill">${b}</span>`).join('')}
        </div>
        <div class="audio-row">
          <button class="play-btn" onclick="speakMantra(${m.id})">▶ Listen</button>
          <span class="count-badge">108 repetitions</span>
        </div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function toggleCard(id) {
  openCards[id] = !openCards[id];
  renderMantras();
}

function setLang(id, lang) {
  activeLangs[id] = lang;
  renderMantras();
}

function speakMantra(id) {
  const m = MANTRAS.find(x => x.id === id);
  if (!m) return;
  const activeLang = activeLangs[id] || Object.keys(m.langs)[0];
  const text = m.langs[activeLang].text;
  const utter = new SpeechSynthesisUtterance(text);
  const langMap = {
    "English":"en-IN","Hindi":"hi-IN","Tamil":"ta-IN","Telugu":"te-IN",
    "Bengali":"bn-IN","Kannada":"kn-IN","Malayalam":"ml-IN","Gujarati":"gu-IN",
    "Marathi":"mr-IN","Odia":"or-IN","Punjabi":"pa-IN"
  };
  utter.lang = langMap[activeLang] || "hi-IN";
  utter.rate = 0.75;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utter);
}

renderCategories();
renderMantras();
</script>
